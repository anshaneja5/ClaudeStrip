name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Run unit tests
        run: ./run-tests.sh
      - name: Build app bundle
        run: ./build-app.sh
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: build/ClaudeStrip.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
